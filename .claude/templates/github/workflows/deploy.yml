# Deploy Workflow - Manuelles Deployment auf Hetzner VPS
#
# Wird NUR manuell getriggert (workflow_dispatch).
# Kopiert Code via SCP auf den Server und baut dort per Docker Compose.
#
# Flow:
# 1. GitHub Actions > Deploy > Run workflow
# 2. Branch/Tag im Dropdown "Use workflow from" waehlen
# 3. Auf dem Server: SCP > Docker Build > Health Check
#
# Rollback: Einfach den vorherigen Release Branch/Tag im Dropdown waehlen.
#   Actions > Deploy > Run workflow > Dropdown: release/v1.1.0
#
# Setup:
# 1. GitHub Variables (Settings > Variables > Actions):
#    - SERVER_HOST: IP oder Hostname des Servers
#    - SERVER_USERNAME: SSH-Benutzer (z.B. deploy)
#    - DEPLOY_PATH: Pfad zur App auf dem Server (z.B. /opt/projektname)
#    - CONTAINER_NAME: Name des primaeren Docker Containers fuer Health Check
#    - HETZNER_FIREWALL_NAME: Name der Hetzner Cloud Firewall
# 2. GitHub Secrets (Settings > Secrets > Actions):
#    - SERVER_SSH_KEY: Privater SSH-Key (komplett inkl. BEGIN/END)
#    - HETZNER_API_KEY: Hetzner Cloud API Token
#    - (weitere projekt-spezifische Secrets als ENV_* hinzufuegen)

name: Deploy

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip test job"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend - Install & Lint & Build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      # Backend (einkommentieren wenn vorhanden):
      # - name: Setup Python
      #   uses: actions/setup-python@v6
      #   with:
      #     python-version: "3.12"
      # - name: Backend - Lint & Test
      #   working-directory: backend
      #   run: |
      #     pip install ruff
      #     ruff check .
      #     ruff format --check .

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Whitelist IP on Hetzner Firewall
        run: |
          FIREWALL_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.HETZNER_API_KEY }}" \
            "https://api.hetzner.cloud/v1/firewalls" \
            | jq -r '.firewalls[] | select(.name=="${{ vars.HETZNER_FIREWALL_NAME }}") | .id')

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HETZNER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "rules": [{
                "direction": "in",
                "protocol": "tcp",
                "port": "22",
                "source_ips": ["${{ steps.ip.outputs.ipv4 }}/32"],
                "description": "GitHub Actions Deploy"
              }]
            }' \
            "https://api.hetzner.cloud/v1/firewalls/$FIREWALL_ID/actions/set_rules" > /dev/null

      - name: Copy files to server
        uses: appleboy/scp-action@v0.2.0
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "."
          target: ${{ vars.DEPLOY_PATH }}
          overwrite: true
          rm: false

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 10m
          envs: DEPLOY_PATH,CONTAINER_NAME
          script: |
            set -e
            cd "$DEPLOY_PATH"

            echo "=== Stopping existing containers ==="
            docker compose down --remove-orphans || true

            echo "=== Building and starting containers ==="
            docker compose build --no-cache
            docker compose up -d

            echo "=== Reload Nginx Proxy ==="
            docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload || true

            echo "=== Health Check ==="
            RETRIES=10
            DELAY=10
            for i in $(seq 1 $RETRIES); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "Health check passed (attempt $i/$RETRIES)"
                break
              fi
              if [ "$i" -eq "$RETRIES" ]; then
                echo "Health check failed after $RETRIES attempts (status: $STATUS)"
                echo "=== Container Logs ==="
                docker compose logs --tail=50
                exit 1
              fi
              echo "Attempt $i/$RETRIES - status: $STATUS, retrying in ${DELAY}s..."
              sleep $DELAY
            done

            echo "=== Pruning old images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
            docker compose ps

      - name: Remove IP from Hetzner Firewall
        if: always()
        run: |
          FIREWALL_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.HETZNER_API_KEY }}" \
            "https://api.hetzner.cloud/v1/firewalls" \
            | jq -r '.firewalls[] | select(.name=="${{ vars.HETZNER_FIREWALL_NAME }}") | .id')

          # Get current rules without the GitHub Actions IP
          curl -s -H "Authorization: Bearer ${{ secrets.HETZNER_API_KEY }}" \
            "https://api.hetzner.cloud/v1/firewalls/$FIREWALL_ID" \
            | jq '{rules: [.firewall.rules[] | select(.description != "GitHub Actions Deploy")]}' \
            | curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.HETZNER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.hetzner.cloud/v1/firewalls/$FIREWALL_ID/actions/set_rules" > /dev/null

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | ${{ vars.SERVER_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tests** | ${{ inputs.skip_tests && 'skipped' || 'passed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
