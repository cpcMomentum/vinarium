# Shutdown Workflow - Container auf dem Server stoppen
#
# Wird NUR manuell getriggert (workflow_dispatch).
# Stoppt alle Docker Container des Projekts auf dem Server.
#
# Verwendet die gleiche Concurrency-Gruppe wie deploy.yml,
# damit Shutdown und Deploy sich nicht gegenseitig stoeren.
#
# Setup: Gleiche Secrets/Variables wie deploy.yml
# Dokumentation: .claude/standards/deployment.md

name: Shutdown

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  shutdown:
    name: Shutdown Containers
    runs-on: ubuntu-latest
    steps:
      - name: Get runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Whitelist IP on Hetzner Firewall
        run: |
          FIREWALL_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.HETZNER_API_KEY }}" \
            "https://api.hetzner.cloud/v1/firewalls" \
            | jq -r '.firewalls[] | select(.name=="${{ vars.HETZNER_FIREWALL_NAME }}") | .id')

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HETZNER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "rules": [{
                "direction": "in",
                "protocol": "tcp",
                "port": "22",
                "source_ips": ["${{ steps.ip.outputs.ipv4 }}/32"],
                "description": "GitHub Actions Shutdown"
              }]
            }' \
            "https://api.hetzner.cloud/v1/firewalls/$FIREWALL_ID/actions/set_rules" > /dev/null

      - name: Stop containers
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            echo "=== Stopping containers ==="
            docker compose down --remove-orphans
            echo "=== Container status ==="
            docker compose ps
            echo "=== Shutdown complete ==="

      - name: Shutdown Summary
        if: always()
        run: |
          echo "## Shutdown Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
