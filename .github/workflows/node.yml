name: node

# Frontend-Gate: Typecheck + vitest + Produktions-Build muessen gruen sein.
# Laeuft auf ALLEN PRs (kein paths-Filter): als Required-Status-Check muss der
# Workflow immer melden, sonst blockiert ein nie-startender Check den Merge.
# (Kein lint-Script in package.json.)

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Abhaengigkeiten installieren
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Frontend-Unit-Tests (vitest)
        run: npm test -- --passWithNoTests
      - name: Produktions-Build
        run: npm run build
